name: Final-Emergency-Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Environment
        run: |
          # تجهيز الملفات
          mkdir -p www
          cp index.html style.css script.js www/ 2>/dev/null || echo "<html><body>Ready</body></html>" > www/index.html
          
          # تثبيت المكتبات
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # تهيئة المشروع
          npx cap init "MyApp" "com.mahmoud.app" --web-dir www
          npx cap add android
          
          # الخطوة الأهم: منع تعارض مكتبات Kotlin نهائياً
          cd android
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # إجبار Gradle على استخدام نسخة وحدة من المكتبات المتعارضة
          sed -i '/dependencies {/a \    constraints {\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.10") { because("Fix duplicate classes") }\n        implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.10") { because("Fix duplicate classes") }\n    }' app/build.gradle

      - name: Generate APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mobile-App-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
