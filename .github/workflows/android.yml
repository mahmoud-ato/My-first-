name: Professional Android Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Initialize Environment & Dependencies
        run: |
          # تجهيز مجلد الويب
          mkdir -p www
          cp index.html style.css script.js www/ 2>/dev/null || true
          
          # تثبيت المكتبات وتجهيز Capacitor بشكل احترافي
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android --save-exact
          
          # تهيئة المشروع بدون تدخل بشري
          npx cap init "My-App" "com.mahmoud.app" --web-dir www --confirm
          npx cap add android

      - name: Android Build (Gradle)
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          # بناء نسخة الـ Debug مع تعطيل الـ Daemon لتوفير الوقت
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-Debug-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
