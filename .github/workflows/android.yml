name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies and Init Capacitor
        run: |
          # إنشاء مجلد الويب والتأكد من وجود الملفات
          mkdir -p www
          [ -f index.html ] && cp index.html www/
          [ -f style.css ] && cp style.css www/
          [ -f script.js ] && cp script.js www/
          
          # تثبيت الأدوات اللازمة
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # تهيئة المشروع
          npx cap init "My-App" "com.mahmoud.app" --web-dir www
          npx cap add android

      - name: Sync and Build APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
