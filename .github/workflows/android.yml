name: Final Android Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Files and Capacitor
        run: |
          # التأكد من وجود المجلد
          mkdir -p www
          
          # محاولة نسخ الملفات لو موجودة، ولو مش موجودة هيعمل ملفات وهمية عشان الـ Build ميفشلش
          cp index.html www/ 2>/dev/null || echo "<html><body><h1>Hello Capacitor</h1></body></html>" > www/index.html
          cp style.css www/ 2>/dev/null || touch www/style.css
          cp script.js www/ 2>/dev/null || touch www/script.js

          # تثبيت وتهيئة Capacitor
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "My-App" "com.mahmoud.app" --web-dir www --confirm
          npx cap add android

      - name: Build APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Package
          path: android/app/build/outputs/apk/debug/app-debug.apk
