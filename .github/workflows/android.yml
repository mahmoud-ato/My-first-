name: Mobile-App-Generator
on: [push, workflow_dispatch]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # تم التغيير لـ 21 لحل مشكلة التوافق
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Environment
        run: |
          mkdir -p www
          [ -f index.html ] && cp index.html www/ || echo "<html><body>Build Ready</body></html>" > www/index.html
          [ -f style.css ] && cp style.css www/ || touch www/style.css
          [ -f script.js ] && cp script.js www/ || touch www/script.js

          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

          npx cap init "My-App" "com.mahmoud.app" --web-dir www
          npx cap add android

      - name: Create APK File
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          # إجبار Gradle على استخدام جافا 21
          ./gradlew assembleDebug --no-daemon

      - name: Final Step - Download APK
        uses: actions/upload-artifact@v4
        with:
          name: Download-Your-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
