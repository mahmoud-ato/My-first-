name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Initialize App
        run: |
          mkdir -p www
          cp index.html style.css script.js www/ || true
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "My-App" "com.mahmoud.app" --web-dir www
          npx cap add android

      - name: Sync and Build
        run: |
          npx cap copy
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Release
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
