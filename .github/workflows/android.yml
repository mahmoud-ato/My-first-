name: Mobile-App-Generator
on: [push, workflow_dispatch]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Environment
        run: |
          mkdir -p www
          [ -f index.html ] && cp index.html www/ || echo "<html><body>Build Ready</body></html>" > www/index.html
          [ -f style.css ] && cp style.css www/ || touch www/style.css
          [ -f script.js ] && cp script.js www/ || touch www/script.js

          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "My-App" "com.mahmoud.app" --web-dir www
          npx cap add android

      - name: Fix Kotlin Duplicate Classes
        run: |
          # السطر ده بيحل مشكلة Duplicate class kotlin عن طريق إجبار أندرويد على نسخة واحدة
          echo "configurations.all { resolutionStrategy.eachDependency { DependencyResolveDetails details -> if (details.requested.group == 'org.jetbrains.kotlin') { details.useVersion '1.8.22' } } }" >> android/build.gradle

      - name: Create APK File
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Final Step - Download APK
        uses: actions/upload-artifact@v4
        with:
          name: Download-Your-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
